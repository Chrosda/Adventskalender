<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearOn Adventskalender</title>
    <style>
        :root {
            --brand-red: #d8232f;
            --brand-red-deep: #8e0e18;
            --brand-lime: #d9ff63;
            --brand-ink: #fff8ef;
            --brand-muted: rgba(255, 248, 239, 0.78);
            --card-bg: rgba(104, 8, 18, 0.34);
            --card-border: rgba(255, 248, 239, 0.22);
            --panel-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
            --body-font: "Plus Jakarta Sans", "Segoe UI", Arial, sans-serif;
            --display-font: "Circular Pro", "Aptos", "Segoe UI", Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: var(--body-font);
            color: #fff;
            background:
                linear-gradient(rgba(86, 0, 10, 0.2), rgba(86, 0, 10, 0.2)),
                url('julkalender_unpacked/background.png') center center / cover no-repeat fixed;
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.12), transparent 28%),
                linear-gradient(180deg, rgba(110, 5, 18, 0.28) 0%, rgba(55, 0, 6, 0.36) 100%);
        }

        .calendar-shell {
            width: min(1280px, 100%);
            min-height: min(860px, calc(100vh - 48px));
            padding: 32px;
            border: 1px solid rgba(255, 248, 239, 0.16);
            border-radius: 28px;
            backdrop-filter: blur(8px);
            background:
                linear-gradient(180deg, rgba(123, 11, 23, 0.34), rgba(73, 4, 10, 0.26)),
                rgba(72, 5, 12, 0.26);
            box-shadow: var(--panel-shadow);
        }

        .header {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 28px;
        }

        .eyebrow {
            margin-bottom: 10px;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            color: var(--brand-muted);
        }

        h1 {
            font-family: var(--display-font);
            font-size: clamp(2.4rem, 5vw, 4.8rem);
            line-height: 0.94;
            letter-spacing: -0.04em;
            color: var(--brand-ink);
        }

        .intro p {
            margin-top: 14px;
            max-width: 560px;
            font-size: clamp(0.96rem, 1.3vw, 1.08rem);
            line-height: 1.55;
            color: var(--brand-muted);
        }

        .brand-badge {
            flex-shrink: 0;
            position: relative;
            isolation: isolate;
            display: flex;
            align-items: center;
            justify-content: center;
            width: clamp(230px, 28vw, 380px);
            min-height: 92px;
            padding: 18px 32px;
            border-radius: 999px;
            background:
                linear-gradient(120deg, rgba(255, 248, 239, 0.28), rgba(255, 248, 239, 0.08) 46%, rgba(255, 248, 239, 0.2)),
                rgba(255, 248, 239, 0.1);
            border: 1px solid rgba(255, 248, 239, 0.26);
            box-shadow:
                inset 0 1px 0 rgba(255, 248, 239, 0.36),
                inset 0 -18px 34px rgba(112, 0, 10, 0.18),
                0 22px 42px rgba(62, 0, 7, 0.24);
            overflow: hidden;
        }

        .brand-badge::before {
            content: "";
            position: absolute;
            inset: 1px;
            border-radius: inherit;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.32), transparent);
            opacity: 0.66;
            transform: translateX(-62%);
            animation: badge-glint 4.8s ease-in-out infinite;
            z-index: -1;
        }

        .brand-badge::after {
            content: "";
            position: absolute;
            inset: 12px 20px;
            border-radius: inherit;
            border: 1px solid rgba(255, 248, 239, 0.12);
            pointer-events: none;
        }

        .brand-badge img {
            width: min(248px, 86%);
            height: auto;
            object-fit: contain;
            opacity: 1;
            filter: drop-shadow(0 10px 18px rgba(55, 0, 8, 0.32));
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(8, minmax(0, 1fr));
            grid-template-rows: repeat(6, minmax(82px, 1fr));
            gap: 14px;
            min-height: 640px;
        }

        .door[data-day="17"] { grid-column: 1 / span 1; grid-row: 1; }
        .door[data-day="3"]  { grid-column: 2 / span 1; grid-row: 1; }
        .door[data-day="21"] { grid-column: 3 / span 2; grid-row: 1; }
        .door[data-day="8"]  { grid-column: 5 / span 1; grid-row: 1; }
        .door[data-day="14"] { grid-column: 6 / span 2; grid-row: 1; }
        .door[data-day="1"]  { grid-column: 8 / span 1; grid-row: 1; }

        .door[data-day="19"] { grid-column: 1 / span 2; grid-row: 2; }
        .door[data-day="5"]  { grid-column: 1 / span 1; grid-row: 3; }
        .door[data-day="22"] { grid-column: 2 / span 1; grid-row: 3; }
        .door[data-day="11"] { grid-column: 1 / span 2; grid-row: 4; }
        .door[data-day="2"]  { grid-column: 1 / span 1; grid-row: 5; }
        .door[data-day="16"] { grid-column: 2 / span 1; grid-row: 5; }

        .door[data-day="9"]  { grid-column: 7 / span 1; grid-row: 2; }
        .door[data-day="20"] { grid-column: 8 / span 1; grid-row: 2; }
        .door[data-day="4"]  { grid-column: 7 / span 2; grid-row: 3; }
        .door[data-day="15"] { grid-column: 7 / span 1; grid-row: 4; }
        .door[data-day="23"] { grid-column: 8 / span 1; grid-row: 4; }
        .door[data-day="7"]  { grid-column: 7 / span 2; grid-row: 5; }

        .door[data-day="13"] { grid-column: 1 / span 1; grid-row: 6; }
        .door[data-day="6"]  { grid-column: 2 / span 2; grid-row: 6; }
        .door[data-day="18"] { grid-column: 4 / span 1; grid-row: 6; }
        .door[data-day="10"] { grid-column: 5 / span 2; grid-row: 6; }
        .door[data-day="12"] { grid-column: 7 / span 1; grid-row: 6; }

        .door[data-day="24"] {
            grid-column: 3 / span 4;
            grid-row: 2 / span 4;
        }

        .sponsor {
            grid-column: 8;
            grid-row: 6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 18px;
            text-align: center;
            border-radius: 22px;
            background:
                linear-gradient(rgba(84, 5, 13, 0.58), rgba(84, 5, 13, 0.58)),
                url("Clearon_Logo_White.png") center 58% / min(112px, 72%) auto no-repeat;
            border: 1px solid var(--card-border);
            box-shadow: inset 0 1px 0 rgba(255, 248, 239, 0.08);
        }

        .sponsor span {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--brand-muted);
        }

        .sponsor img {
            width: 100%;
            max-width: 112px;
            object-fit: contain;
            opacity: 0;
        }

        .door {
            position: relative;
            display: block;
            width: 100%;
            height: 100%;
            min-height: 82px;
            perspective: 1200px;
            cursor: pointer;
            border: 0;
            padding: 0;
            background: transparent;
            appearance: none;
            overflow: visible;
            transform: translateY(0) scale(1);
            transform-style: preserve-3d;
            will-change: transform, filter;
            transition:
                transform 0.28s cubic-bezier(0.16, 1, 0.3, 1),
                filter 0.28s ease;
        }

        .door::before {
            content: "";
            position: absolute;
            left: 8%;
            right: 8%;
            bottom: -12px;
            height: 30px;
            border-radius: 999px;
            background: radial-gradient(ellipse at center, rgba(25, 0, 4, 0.42), transparent 70%);
            opacity: 0;
            transform: translateY(2px) scale(0.82);
            transition: opacity 0.28s ease, transform 0.28s ease;
            pointer-events: none;
            z-index: 0;
        }

        .door::after {
            content: "";
            position: absolute;
            inset: 12%;
            border-radius: 22px;
            background:
                radial-gradient(circle at 20% 30%, rgba(255, 248, 239, 0.95) 0 4px, transparent 5px),
                radial-gradient(circle at 78% 24%, rgba(255, 214, 122, 0.95) 0 3px, transparent 4px),
                radial-gradient(circle at 70% 72%, rgba(255, 248, 239, 0.9) 0 3px, transparent 4px),
                radial-gradient(circle at 35% 78%, rgba(255, 214, 122, 0.88) 0 2px, transparent 3px);
            opacity: 0;
            transform: scale(0.82);
            pointer-events: none;
            filter: drop-shadow(0 0 10px rgba(255, 232, 166, 0.65));
            z-index: 4;
        }

        .door-front,
        .door-back {
            position: absolute;
            inset: 0;
            display: flex;
            border-radius: 22px;
            overflow: hidden;
            pointer-events: none;
        }

        .door-front {
            align-items: center;
            justify-content: center;
            border: 1px solid var(--card-border);
            background:
                linear-gradient(160deg, rgba(255, 248, 239, 0.08), rgba(255, 248, 239, 0.02)),
                linear-gradient(180deg, rgba(196, 28, 44, 0.98), rgba(129, 11, 24, 0.98));
            box-shadow:
                inset 0 1px 0 rgba(255, 248, 239, 0.18),
                0 18px 28px rgba(76, 0, 6, 0.18);
            color: var(--brand-ink);
            font-family: var(--display-font);
            font-size: clamp(1.15rem, 2.6vw, 1.8rem);
            font-weight: 600;
            letter-spacing: -0.03em;
            transform-origin: left center;
            transform-style: preserve-3d;
            backface-visibility: hidden;
            transition: transform 0.75s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.35s ease;
            z-index: 2;
        }

        .door-front::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(120deg, rgba(255, 248, 239, 0.18), transparent 30%),
                linear-gradient(180deg, transparent 0%, rgba(109, 4, 12, 0.26) 100%);
        }

        .door-front::after {
            content: "";
            position: absolute;
            left: 18px;
            right: 18px;
            bottom: 16px;
            height: 1px;
            background: rgba(255, 248, 239, 0.18);
        }

        .door-back::before {
            content: "";
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(255, 248, 239, 0.12);
            border-radius: 16px;
            pointer-events: none;
        }

        .door-back {
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 8px;
            padding: 14px 12px 12px;
            text-align: center;
            background:
                linear-gradient(180deg, rgba(92, 5, 14, 1), rgba(58, 4, 10, 1)),
                rgba(32, 0, 3, 1);
            border: 1px solid var(--card-border);
            box-shadow: inset 0 1px 0 rgba(255, 248, 239, 0.08);
            z-index: 1;
            opacity: 0.7;
            transform: scale(0.96);
            transition: opacity 0.35s ease, transform 0.42s ease;
        }

        .door-date {
            font-size: clamp(0.6rem, 0.86vw, 0.74rem);
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--brand-muted);
        }

        .door-content {
            font-family: var(--body-font);
            font-size: clamp(0.78rem, 1.12vw, 0.96rem);
            font-weight: 500;
            line-height: 1.28;
            color: var(--brand-ink);
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            overflow: hidden;
            max-width: 100%;
        }

        .door-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 34px;
            margin-top: auto;
            padding: 7px 13px;
            max-width: 100%;
            border: 1px solid rgba(255, 248, 239, 0.34);
            border-radius: 999px;
            background:
                linear-gradient(180deg, rgba(255, 248, 239, 0.26), rgba(255, 248, 239, 0.14));
            color: var(--brand-ink);
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            white-space: nowrap;
            text-decoration: none;
            box-shadow: 0 8px 18px rgba(20, 0, 2, 0.22);
            transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            pointer-events: auto;
        }

        .door-link:hover {
            background: rgba(255, 248, 239, 0.32);
            border-color: rgba(217, 255, 99, 0.42);
            transform: translateY(-4px) scale(1.04);
            box-shadow:
                0 10px 18px rgba(20, 0, 2, 0.32),
                0 0 22px rgba(217, 255, 99, 0.2);
        }

        .door-link:focus-visible {
            outline: 2px solid #ffffff;
            outline-offset: 2px;
        }

        .door:hover {
            filter: saturate(1.18) brightness(1.04);
            transform: translateY(-11px) scale(1.035);
            z-index: 5;
        }

        .door:hover::before {
            opacity: 1;
            transform: translateY(10px) scale(1);
        }

        .door:hover .door-front {
            border-color: rgba(255, 248, 239, 0.36);
            transform: translateZ(18px) rotateX(4deg);
            box-shadow:
                inset 0 1px 0 rgba(255, 248, 239, 0.2),
                inset 0 -14px 26px rgba(86, 0, 9, 0.18),
                0 12px 22px rgba(255, 232, 166, 0.18),
                0 28px 46px rgba(76, 0, 6, 0.42),
                0 0 34px rgba(217, 255, 99, 0.14);
        }

        .door:not([data-day="24"]) .door-link::after {
            content: "→";
            margin-left: 6px;
            font-size: 0.86em;
        }

        .door.opened .door-front {
            transform: rotateY(-128deg);
            animation: door-swing 0.98s cubic-bezier(0.2, 0.85, 0.25, 1) both;
        }

        .door.opened .door-back {
            z-index: 3;
            opacity: 1;
            transform: scale(1);
            background:
                linear-gradient(180deg, rgba(102, 12, 18, 1), rgba(43, 58, 36, 0.98)),
                rgba(32, 0, 3, 1);
            border-color: rgba(217, 255, 99, 0.24);
            box-shadow:
                inset 0 1px 0 rgba(255, 248, 239, 0.1),
                inset 0 -18px 36px rgba(217, 255, 99, 0.05);
        }

        .door.opening::after {
            animation: sparkle-burst 0.82s ease-out forwards;
        }

        .door.opening .door-back {
            animation: back-reveal 0.6s ease-out 0.16s both;
        }

        .door[data-day="24"] .door-front {
            font-size: clamp(2.8rem, 6.5vw, 5rem);
        }

        .door[data-day="24"] .door-back .door-date {
            font-size: clamp(0.92rem, 1.7vw, 1.2rem);
        }

        .door[data-day="24"] .door-back .door-content {
            font-size: clamp(1.15rem, 2.1vw, 1.65rem);
            -webkit-line-clamp: 3;
        }

        .door[data-day="24"] .door-link {
            font-size: 1rem;
            padding: 12px 22px;
            min-height: 46px;
        }

        @keyframes door-swing {
            0% {
                transform: rotateY(0deg);
            }
            46% {
                transform: rotateY(-148deg);
            }
            66% {
                transform: rotateY(-118deg);
            }
            82% {
                transform: rotateY(-132deg);
            }
            100% {
                transform: rotateY(-128deg);
            }
        }

        @keyframes sparkle-burst {
            0% {
                opacity: 0;
                transform: scale(0.82) rotate(-8deg);
            }
            30% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: scale(1.18) rotate(10deg);
            }
        }

        @keyframes back-reveal {
            0% {
                opacity: 0;
                transform: scale(0.92);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes badge-glint {
            0%, 42% {
                transform: translateX(-72%);
            }
            58%, 100% {
                transform: translateX(72%);
            }
        }

        @media (max-width: 920px) {
            .page {
                padding: 14px;
            }

            .calendar-shell {
                min-height: auto;
                padding: 18px;
                border-radius: 24px;
            }

            .header {
                flex-direction: column;
                align-items: stretch;
                margin-bottom: 18px;
            }

            .brand-badge {
                width: min(100%, 360px);
                min-width: 0;
                align-self: flex-start;
            }

            .calendar {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                grid-template-rows: none;
                grid-auto-rows: minmax(108px, auto);
                min-height: auto;
            }

            .door,
            .sponsor,
            .door[data-day] {
                grid-column: auto;
                grid-row: auto;
            }

            .door[data-day="24"] {
                grid-column: span 2;
                min-height: 180px;
            }

            .sponsor {
                grid-column: span 2;
                min-height: 120px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .door,
            .door-front,
            .door-back {
                transition: none;
            }

            .door::after,
            .door.opening .door-back,
            .door.opened .door-front {
                animation: none;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="calendar-shell">
            <header class="header">
                <div class="intro">
                    <p class="eyebrow">ClearOn x Coca-Cola</p>
                    <h1>Adventskalender</h1>
                    <p>&Ouml;ppna en lucka varje dag och l&aring;t Coca-Cola-bakgrunden b&auml;ra hela uttrycket, precis som i mockupen.</p>
                </div>
                <div class="brand-badge">
                    <img src="Clearon_Logo_White.png" alt="ClearOn">
                </div>
            </header>
            <div class="calendar" id="calendar"></div>
        </section>
    </main>

    <script>
        const contents = [
            { day: 1, text: "Pepparkakor" },
            { day: 2, text: "Gl&ouml;gg" },
            { day: 3, text: "Julmusik" },
            { day: 4, text: "Adventsljus" },
            { day: 5, text: "Julklappsrim" },
            { day: 6, text: "Luciabulle" },
            { day: 7, text: "Julgranskulor" },
            { day: 8, text: "Sn&ouml;flingor" },
            { day: 9, text: "Tomteluva" },
            { day: 10, text: "Julskinka" },
            { day: 11, text: "Stj&auml;rna" },
            { day: 12, text: "Paketinslagning" },
            { day: 13, text: "Lucia" },
            { day: 14, text: "Julmarknad" },
            { day: 15, text: "K&ouml;rs&aring;ng" },
            { day: 16, text: "Vantar" },
            { day: 17, text: "Chokladkalender" },
            { day: 18, text: "Julfilm" },
            { day: 19, text: "Lussekatt" },
            { day: 20, text: "Juleljus" },
            { day: 21, text: "Midvinterblot" },
            { day: 22, text: "Julbord" },
            { day: 23, text: "Dan f&ouml;re dopparedan" },
            { day: 24, text: "God jul!" }
        ];

        const calendar = document.getElementById("calendar");

        contents.forEach(({ day, text }) => {
            const door = document.createElement("div");
            door.className = "door";
            door.dataset.day = String(day);
            door.tabIndex = 0;
            door.setAttribute("role", "button");
            door.setAttribute("aria-label", `Oppna lucka ${day}`);

            const linkMarkup = `<a class="door-link" href="undersida.html?day=${day}">Oppna sida</a>`;

            door.innerHTML = `
                <span class="door-front">${day}</span>
                <span class="door-back">
                    <span class="door-date">${day} december</span>
                    <span class="door-content">${text}</span>
                    ${linkMarkup}
                </span>
            `;

            const toggleDoor = () => {
                const isOpen = door.classList.toggle("opened");
                door.setAttribute("aria-pressed", isOpen ? "true" : "false");

                if (isOpen) {
                    door.classList.remove("opening");
                    void door.offsetWidth;
                    door.classList.add("opening");
                    window.setTimeout(() => {
                        door.classList.remove("opening");
                    }, 900);
                } else {
                    door.classList.remove("opening");
                }
            };

            door.addEventListener("click", (event) => {
                if (event.target.closest(".door-link")) {
                    return;
                }
                toggleDoor();
            });

            door.addEventListener("keydown", (event) => {
                if (event.key === "Enter" || event.key === " ") {
                    event.preventDefault();
                    toggleDoor();
                }
            });

            calendar.appendChild(door);
        });

        const sponsor = document.createElement("aside");
        sponsor.className = "sponsor";
        sponsor.innerHTML = `
            <span>I samarbete med</span>
            <img src="Clearon_Logo_White.png" alt="ClearOn">
        `;
        calendar.appendChild(sponsor);
    </script>
</body>
</html>
