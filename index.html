<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearOn Adventskalender</title>
    <style>
        :root {
            --brand-red: #d8232f;
            --brand-red-deep: #8e0e18;
            --brand-ink: #fff8ef;
            --brand-muted: rgba(255, 248, 239, 0.78);
            --card-bg: rgba(104, 8, 18, 0.34);
            --card-border: rgba(255, 248, 239, 0.22);
            --panel-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
            --body-font: "Plus Jakarta Sans", "Segoe UI", Arial, sans-serif;
            --display-font: "Circular Pro", "Aptos", "Segoe UI", Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: var(--body-font);
            color: #fff;
            background:
                linear-gradient(rgba(86, 0, 10, 0.2), rgba(86, 0, 10, 0.2)),
                url('background.png') center center / cover no-repeat fixed;
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.12), transparent 28%),
                linear-gradient(180deg, rgba(110, 5, 18, 0.28) 0%, rgba(55, 0, 6, 0.36) 100%);
        }

        .calendar-shell {
            width: min(1280px, 100%);
            min-height: min(860px, calc(100vh - 48px));
            padding: 32px;
            border: 1px solid rgba(255, 248, 239, 0.16);
            border-radius: 28px;
            backdrop-filter: blur(8px);
            background:
                linear-gradient(180deg, rgba(123, 11, 23, 0.34), rgba(73, 4, 10, 0.26)),
                rgba(72, 5, 12, 0.26);
            box-shadow: var(--panel-shadow);
        }

        .header {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 28px;
        }

        .eyebrow {
            margin-bottom: 10px;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            color: var(--brand-muted);
        }

        h1 {
            font-family: var(--display-font);
            font-size: clamp(2.4rem, 5vw, 4.8rem);
            line-height: 0.94;
            letter-spacing: -0.04em;
            color: var(--brand-ink);
        }

        .intro p {
            margin-top: 14px;
            max-width: 560px;
            font-size: clamp(0.96rem, 1.3vw, 1.08rem);
            line-height: 1.55;
            color: var(--brand-muted);
        }

        .brand-badge {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 172px;
            padding: 16px 22px;
            border-radius: 999px;
            background: rgba(255, 248, 239, 0.1);
            border: 1px solid rgba(255, 248, 239, 0.18);
        }

        .brand-badge img {
            width: min(180px, 100%);
            height: auto;
            object-fit: contain;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(8, minmax(0, 1fr));
            grid-template-rows: repeat(6, minmax(82px, 1fr));
            gap: 14px;
            min-height: 640px;
        }

        .door[data-day="17"] { grid-column: 1 / span 1; grid-row: 1; }
        .door[data-day="3"]  { grid-column: 2 / span 1; grid-row: 1; }
        .door[data-day="21"] { grid-column: 3 / span 2; grid-row: 1; }
        .door[data-day="8"]  { grid-column: 5 / span 1; grid-row: 1; }
        .door[data-day="14"] { grid-column: 6 / span 2; grid-row: 1; }
        .door[data-day="1"]  { grid-column: 8 / span 1; grid-row: 1; }

        .door[data-day="19"] { grid-column: 1 / span 2; grid-row: 2; }
        .door[data-day="5"]  { grid-column: 1 / span 1; grid-row: 3; }
        .door[data-day="22"] { grid-column: 2 / span 1; grid-row: 3; }
        .door[data-day="11"] { grid-column: 1 / span 2; grid-row: 4; }
        .door[data-day="2"]  { grid-column: 1 / span 1; grid-row: 5; }
        .door[data-day="16"] { grid-column: 2 / span 1; grid-row: 5; }

        .door[data-day="9"]  { grid-column: 7 / span 1; grid-row: 2; }
        .door[data-day="20"] { grid-column: 8 / span 1; grid-row: 2; }
        .door[data-day="4"]  { grid-column: 7 / span 2; grid-row: 3; }
        .door[data-day="15"] { grid-column: 7 / span 1; grid-row: 4; }
        .door[data-day="23"] { grid-column: 8 / span 1; grid-row: 4; }
        .door[data-day="7"]  { grid-column: 7 / span 2; grid-row: 5; }

        .door[data-day="13"] { grid-column: 1 / span 1; grid-row: 6; }
        .door[data-day="6"]  { grid-column: 2 / span 2; grid-row: 6; }
        .door[data-day="18"] { grid-column: 4 / span 1; grid-row: 6; }
        .door[data-day="10"] { grid-column: 5 / span 2; grid-row: 6; }
        .door[data-day="12"] { grid-column: 7 / span 1; grid-row: 6; }

        .door[data-day="24"] {
            grid-column: 3 / span 4;
            grid-row: 2 / span 4;
        }

        .sponsor {
            grid-column: 8;
            grid-row: 6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 18px;
            text-align: center;
            border-radius: 22px;
            background: rgba(84, 5, 13, 0.58);
            border: 1px solid var(--card-border);
            box-shadow: inset 0 1px 0 rgba(255, 248, 239, 0.08);
        }

        .sponsor span {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--brand-muted);
        }

        .sponsor img {
            width: 100%;
            max-width: 112px;
            object-fit: contain;
        }

        .door {
            position: relative;
            display: block;
            width: 100%;
            height: 100%;
            min-height: 82px;
            perspective: 1200px;
            cursor: pointer;
            border: 0;
            padding: 0;
            background: transparent;
            appearance: none;
            overflow: visible;
        }

        .door-front,
        .door-back {
            position: absolute;
            inset: 0;
            display: flex;
            border-radius: 22px;
            overflow: hidden;
            pointer-events: none;
        }

        .door-front {
            align-items: center;
            justify-content: center;
            border: 1px solid var(--card-border);
            background:
                linear-gradient(160deg, rgba(255, 248, 239, 0.08), rgba(255, 248, 239, 0.02)),
                linear-gradient(180deg, rgba(196, 28, 44, 0.98), rgba(129, 11, 24, 0.98));
            box-shadow:
                inset 0 1px 0 rgba(255, 248, 239, 0.18),
                0 18px 28px rgba(76, 0, 6, 0.18);
            color: var(--brand-ink);
            font-family: var(--display-font);
            font-size: clamp(1.15rem, 2.6vw, 1.8rem);
            font-weight: 600;
            letter-spacing: -0.03em;
            transform-origin: left center;
            transform-style: preserve-3d;
            backface-visibility: hidden;
            transition: transform 0.75s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.35s ease;
            z-index: 2;
        }

        .door-front::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(120deg, rgba(255, 248, 239, 0.18), transparent 30%),
                linear-gradient(180deg, transparent 0%, rgba(109, 4, 12, 0.26) 100%);
        }

        .door-front::after {
            content: "";
            position: absolute;
            left: 18px;
            right: 18px;
            bottom: 16px;
            height: 1px;
            background: rgba(255, 248, 239, 0.18);
        }

        .door-back {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px;
            text-align: center;
            background:
                linear-gradient(180deg, rgba(92, 5, 14, 1), rgba(58, 4, 10, 1)),
                rgba(32, 0, 3, 1);
            border: 1px solid var(--card-border);
            box-shadow: inset 0 1px 0 rgba(255, 248, 239, 0.08);
            z-index: 1;
        }

        .door-date {
            font-size: clamp(0.66rem, 1vw, 0.8rem);
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--brand-muted);
        }

        .door-content {
            font-family: var(--body-font);
            font-size: clamp(0.84rem, 1.35vw, 1rem);
            font-weight: 500;
            line-height: 1.4;
            color: var(--brand-ink);
        }

        .door-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 10px 18px;
            border: 1px solid rgba(255, 248, 239, 0.42);
            border-radius: 999px;
            background: rgba(255, 248, 239, 0.14);
            color: var(--brand-ink);
            font-size: 0.9rem;
            font-weight: 700;
            text-decoration: none;
            transition: background-color 0.2s ease, transform 0.2s ease;
            pointer-events: auto;
        }

        .door-link:hover {
            background: rgba(255, 248, 239, 0.24);
            transform: translateY(-1px);
        }

        .door-link:focus-visible {
            outline: 2px solid #ffffff;
            outline-offset: 2px;
        }

        .door:hover .door-front {
            box-shadow:
                inset 0 1px 0 rgba(255, 248, 239, 0.2),
                0 20px 32px rgba(76, 0, 6, 0.24);
        }

        .door.opened .door-front {
            transform: rotateY(-128deg);
        }

        .door.opened .door-back {
            z-index: 3;
        }

        .door[data-day="24"] .door-front {
            font-size: clamp(2.8rem, 6.5vw, 5rem);
        }

        .door[data-day="24"] .door-back .door-date {
            font-size: clamp(0.92rem, 1.7vw, 1.2rem);
        }

        .door[data-day="24"] .door-back .door-content {
            font-size: clamp(1.15rem, 2.1vw, 1.65rem);
        }

        .door[data-day="24"] .door-link {
            font-size: 1rem;
            padding: 12px 22px;
        }

        @media (max-width: 920px) {
            .page {
                padding: 14px;
            }

            .calendar-shell {
                min-height: auto;
                padding: 18px;
                border-radius: 24px;
            }

            .header {
                flex-direction: column;
                align-items: stretch;
                margin-bottom: 18px;
            }

            .brand-badge {
                min-width: 0;
                align-self: flex-start;
            }

            .calendar {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                grid-template-rows: none;
                grid-auto-rows: minmax(108px, auto);
                min-height: auto;
            }

            .door,
            .sponsor,
            .door[data-day] {
                grid-column: auto;
                grid-row: auto;
            }

            .door[data-day="24"] {
                grid-column: span 2;
                min-height: 180px;
            }

            .sponsor {
                grid-column: span 2;
                min-height: 120px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .door-front {
                transition: none;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="calendar-shell">
            <header class="header">
                <div class="intro">
                    <p class="eyebrow">ClearOn x Coca-Cola</p>
                    <h1>Adventskalender</h1>
                    <p>&Ouml;ppna en lucka varje dag och l&aring;t Coca-Cola-bakgrunden b&auml;ra hela uttrycket, precis som i mockupen.</p>
                </div>
                <div class="brand-badge">
                    <img src="Clearon_Logo_Lime.png" alt="ClearOn">
                </div>
            </header>
            <div class="calendar" id="calendar"></div>
        </section>
    </main>

    <script>
        const contents = [
            { day: 1, text: "Pepparkakor" },
            { day: 2, text: "Gl&ouml;gg" },
            { day: 3, text: "Julmusik" },
            { day: 4, text: "Adventsljus" },
            { day: 5, text: "Julklappsrim" },
            { day: 6, text: "Luciabulle" },
            { day: 7, text: "Julgranskulor" },
            { day: 8, text: "Sn&ouml;flingor" },
            { day: 9, text: "Tomteluva" },
            { day: 10, text: "Julskinka" },
            { day: 11, text: "Stj&auml;rna" },
            { day: 12, text: "Paketinslagning" },
            { day: 13, text: "Lucia" },
            { day: 14, text: "Julmarknad" },
            { day: 15, text: "K&ouml;rs&aring;ng" },
            { day: 16, text: "Vantar" },
            { day: 17, text: "Chokladkalender" },
            { day: 18, text: "Julfilm" },
            { day: 19, text: "Lussekatt" },
            { day: 20, text: "Juleljus" },
            { day: 21, text: "Midvinterblot" },
            { day: 22, text: "Julbord" },
            { day: 23, text: "Dan f&ouml;re dopparedan" },
            { day: 24, text: "God jul!" }
        ];

        const campaignDays = new Set([3, 6, 9, 12, 15, 18, 21, 24]);
        const productDays = new Set([4, 8, 13, 17, 22]);

        const calendar = document.getElementById("calendar");

        contents.forEach(({ day, text }) => {
            const door = document.createElement("div");
            door.className = "door";
            door.dataset.day = String(day);
            door.tabIndex = 0;
            door.setAttribute("role", "button");
            door.setAttribute("aria-label", `Oppna lucka ${day}`);

            let linkMarkup = "";

            if (campaignDays.has(day)) {
                linkMarkup = `<a class="door-link" href="undersida.html?day=${day}">Oppna sida</a>`;
            } else if (productDays.has(day)) {
                linkMarkup = `<a class="door-link" href="produktsida.html?day=${day}">Se presentkort</a>`;
            }

            door.innerHTML = `
                <span class="door-front">${day}</span>
                <span class="door-back">
                    <span class="door-date">${day} december</span>
                    <span class="door-content">${text}</span>
                    ${linkMarkup}
                </span>
            `;

            const toggleDoor = () => {
                const isOpen = door.classList.toggle("opened");
                door.setAttribute("aria-pressed", isOpen ? "true" : "false");
            };

            door.addEventListener("click", (event) => {
                if (event.target.closest(".door-link")) {
                    return;
                }
                toggleDoor();
            });

            door.addEventListener("keydown", (event) => {
                if (event.key === "Enter" || event.key === " ") {
                    event.preventDefault();
                    toggleDoor();
                }
            });

            calendar.appendChild(door);
        });

        const sponsor = document.createElement("aside");
        sponsor.className = "sponsor";
        sponsor.innerHTML = `
            <span>I samarbete med</span>
            <img src="Clearon_Logo_Lime.png" alt="ClearOn">
        `;
        calendar.appendChild(sponsor);
    </script>
</body>
</html>
